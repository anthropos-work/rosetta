## SHELL — HOST SYSTEM TOOLS, NOT BUNDLED/FETCHED
# The M31 up-injected.sh branch invokes `mkcert` and `openssl` as HOST binaries,
# PATH-detected via `command -v mkcert` with a graceful openssl self-signed fallback
# (and DEMO_NO_MKCERT opt-out). Neither is fetched, vendored, installed, or pinned
# by the bring-up. Verified: the M31 shell diff introduces NONE of the fetch/install
# patterns (brew/npm/pip/go install, curl, wget, docker pull, git clone).
# => mkcert is an optional operator-provided runtime tool, not a dependency of the release.

