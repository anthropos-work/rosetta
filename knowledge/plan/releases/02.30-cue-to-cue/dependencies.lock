# dependencies.lock — v2.3 "cue to cue"

Dependency snapshot of the rext code-of-record `cue-to-cue-m221-final` (rosetta-extensions), captured at
release close 2026-07-15. Source of truth = each Go module's `go.mod`.

## Change vs v2.2 "panorama"

**The ONLY dependency change in the entire v2.3 range is one INDIRECT patch bump:**

    golang.org/x/crypto  v0.51.0 → v0.52.0   (indirect, in clerkenstein; behaviour-neutral; landed at the M218 close)

Zero net-new **direct** Go deps. Zero `package.json` / `requirements.txt` changes. `go.mod`/`go.sum` are otherwise
byte-identical to v2.2. `govulncheck` = "No vulnerabilities found" on all 6 modules. All licenses permissive
(MIT/BSD/Apache; no copyleft).

